scan_network:
  name: Escanear red
  description: Descubre dispositivos Tuya en la red local y actualiza las IPs conocidas.

sync_cloud:
  name: Sincronizar con Tuya Cloud
  description: Importa device IDs y local keys desde Tuya IoT Cloud. Las credenciales son opcionales si ya están guardadas.
  fields:
    api_key:
      name: Access ID
      required: false
      selector:
        text:
    api_secret:
      name: Access Secret
      required: false
      selector:
        text:
          type: password
    region:
      name: Región
      default: us
      selector:
        select:
          options:
            - us
            - eu
            - cn
            - in
    device_id:
      name: ID específico (opcional)
      description: Si se especifica, solo sincroniza ese dispositivo.
      required: false
      selector:
        text:

reload_devices:
  name: Recargar dispositivos
  description: Recarga los dispositivos almacenados y refresca las entidades en Home Assistant.

diagnostics:
  name: Diagnósticos
  description: Retorna información detallada sobre la integración y todos los dispositivos registrados.

test_device:
  name: Probar dispositivo
  description: Prueba la conectividad LAN de un dispositivo específico y retorna los DPS en tiempo real.
  fields:
    device_id:
      name: ID del dispositivo
      description: ID del dispositivo a probar.
      required: true
      selector:
        text:

fetch_dps:
  name: Obtener DPS
  description: Obtiene todos los DPS (Data Points) de un dispositivo en tiempo real para diagnóstico.
  fields:
    device_id:
      name: ID del dispositivo
      description: ID del dispositivo del que obtener los DPS.
      required: true
      selector:
        text:
